layout:
  qmk_info_json: ./keymap-drawer/ansi-keyboard.json
  layout_name: LAYOUT_macbook_ansi

layers:
  Base:
    # Function row (16 keys) - not used
    - [
        null,
        null,
        null,
        null,
        null,
        null,
        null,
        null,
        null,
        null,

        { tap: "z", shifted: "Z" },
        { tap: "x", shifted: "X" },
        { tap: "c", shifted: "C" },
        { tap: "d", shifted: "D" },
        { tap: "v", shifted: "V" },
        null,
        null,
        { tap: "k", shifted: "K" },
        { tap: "h", shifted: "H" },
        { tap: ",", shifted: "_" },
        { tap: ".", shifted: "?" },
        { tap: "/", shifted: "\\" },
        null,
      ]

    # Space row (10 keys)
    # Note: ⇧ is tap-dance (tap once=shift, tap twice=caps-word), shown as tap/hold for visualization
    - [
        null,
        null,
        null,
        { tap: "TL" },
        { tap: "⇧", hold: "CW" },
        { tap: "␣" },
        { tap: "TR" },
        null,
        null,
        null,
      ]


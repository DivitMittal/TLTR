        null,
        null,
        null,
        null,
        null,
        null,
        null,
        null,
        null,
        null,
        null,
      ]

    # Top alpha row (14 keys) - Colemak with Wide mod
    - [
        { tap: "⟳" },
        { tap: "q", shifted: "Q" },
        { tap: "w", shifted: "W" },
        { tap: "f", shifted: "F" },
        { tap: "p", shifted: "P" },
        { tap: "b", shifted: "B" },
        null,
        { tap: "j", shifted: "J" },
        { tap: "l", shifted: "L" },
        { tap: "u", shifted: "U" },
        { tap: "y", shifted: "Y" },
        { tap: "'", shifted: '"' },
        { tap: ";", shifted: ":" },
        null,
      ]

    # Home row (13 keys) - Colemak with Wide mod
    - [
        { tap: "⌫", shifted: "⌦" },
        { tap: "a", shifted: "A" },
        { tap: "r", shifted: "R" },
        { tap: "s", shifted: "S" },
        { tap: "t", shifted: "T" },
        { tap: "g", shifted: "G" },
        null,
        { tap: "m", shifted: "M" },
        { tap: "n", shifted: "N" },
        { tap: "e", shifted: "E" },
        { tap: "i", shifted: "I" },
        { tap: "o", shifted: "O" },
        { tap: "⏎" },
      ]

    # Bottom row (13 keys) - Colemak with Wide + Angle mod
